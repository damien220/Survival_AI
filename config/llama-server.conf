# =============================================================================
# llama.cpp Server Configuration
# =============================================================================
# These settings are applied when launching llama-server inside the container.
# Most values are overridden by environment variables from .env / docker-compose.
#
# This file serves as documentation of all available tuning knobs.
# The Dockerfile entrypoint reads from environment variables, not this file.
# To customize, edit .env or pass environment variables in docker-compose.yml.
# =============================================================================

# --- Networking ---
# Host to bind to (0.0.0.0 = all interfaces, required inside container)
# LLAMA_HOST=0.0.0.0
# LLAMA_PORT=8080

# --- Model ---
# Path to the GGUF model file (mounted from host ./models/ directory)
# LLAMA_MODEL=/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

# --- Performance ---
# Context size in tokens
# LLAMA_CTX_SIZE=4096

# Batch size for prompt processing (higher = faster prompt ingestion, more RAM)
# LLAMA_BATCH_SIZE=512

# Number of CPU threads (0 = auto-detect based on available cores)
# LLAMA_THREADS=0

# Number of model layers to offload to GPU (0 = CPU only, -1 = all layers)
# LLAMA_GPU_LAYERS=0

# --- API ---
# Enable OpenAI-compatible API endpoints (/v1/chat/completions, /v1/models, etc.)
# This is always enabled in our setup since Open WebUI depends on it.

# --- Logging ---
# Log level: none, error, warn, info, debug
# LLAMA_LOG_LEVEL=info
